@if(activeUser){
<div class="profile-container">
<mat-card class="profile-main-card">

    <mat-card-header>
        <h1>Korisnicki podaci</h1>
    </mat-card-header>
    
        <mat-card-content class="profile-form">

        <mat-form-field class="full-width">
            <mat-label>Vase ime:</mat-label>
            <input matInput type="text" [(ngModel)]="activeUser!.firstName">
        </mat-form-field>
        
        <mat-form-field class="full-width">
            <mat-label>Vase prezime:</mat-label>
            <input matInput type="text" [(ngModel)]="activeUser!.lastName">
        </mat-form-field>

        <mat-form-field class="full-width">
            <mat-label>Email adresa:</mat-label>
            <input matInput type="email" [(ngModel)]="activeUser!.email" disabled>
        </mat-form-field>
        
        <mat-form-field class="full-width">
            <mat-label>Adresa:</mat-label>
            <input matInput type="text" [(ngModel)]="activeUser!.address">
        </mat-form-field>
        
        <mat-form-field class="full-width">
            <mat-label>Telefon:</mat-label>
            <input matInput type="text" [(ngModel)]="activeUser!.phone">
        </mat-form-field>
        
        <mat-form-field class="full-width">
        <mat-label>Omiljeni tip igracke: </mat-label>
        <mat-select [(ngModel)]="activeUser!.toyType">
            @for(t of toy(); track $index){
                <mat-option [value]="t">{{t}}</mat-option>
            }
        </mat-select>
        </mat-form-field>
    </mat-card-content>

    <mat-card-actions>
       <button type="button" class="but" matButton (click)="updateUser()">
        <mat-icon fontIcon="save" /> Sacuvaj promene
        </button>
    </mat-card-actions>
</mat-card>

<div class="profile-row">

    <mat-card class="profile-card">
        <mat-card-header>
            <h2>General Information</h2>
        </mat-card-header>
        <mat-card-content class="user-info">
                <img [src]="getAvatarUrl()" class="user-avatar">
                <h3>{{activeUser!.email}}</h3>
        </mat-card-content>
    </mat-card>
        
    <mat-card class="profile-card">
        <mat-card-header>
            <h2>Change Password</h2>
        </mat-card-header>
        <mat-card-content>
                
            <mat-form-field class="full-width">
                <mat-label>Old Password</mat-label>
                <input matInput type="password" [(ngModel)]="oldPassword">
            </mat-form-field>
            
            <mat-form-field class="full-width">
                <mat-label>New Password</mat-label>
                <input matInput type="password" [(ngModel)]="newPassword">
            </mat-form-field>
            
            <mat-form-field class="full-width">
                <mat-label>Repeat Password</mat-label>
                <input matInput type="password" [(ngModel)]="passRepeat">
            </mat-form-field>
        </mat-card-content>

        <mat-card-actions>
            <button type="button" class="but" matButton (click)="updatePassword()">
                <mat-icon fontIcon="password" /> Update Password
            </button>
        </mat-card-actions>
    </mat-card>
    </div>
</div>
}@else {
    <app-loading></app-loading>
}
