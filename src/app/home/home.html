@for (toy of toys(); track toy.toyId) {

  <p>{{ toy.description }}</p>

  <p>Tip: {{ toy.type!.name }}</p>

  <p>Uzrast: {{ toy.ageGroup!.name }}</p>

  <p>Cena: {{ toy.price }} RSD</p>}
