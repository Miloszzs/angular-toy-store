<mat-toolbar>
    <span><strong>Toy store 12221</strong></span>
    <span class="spacer"></span>
    <a routerLink="/" matButton><mat-icon fontIcon="home"/>Home</a>
    <a routerLink="/about" matButton><mat-icon fontIcon="info"/>About</a>
    
    @if(authService.getActiveUser()) {
    <a routerLink="/user" matButton><mat-icon fontIcon="account_box" />Account</a>
    <button matButton (click)="doLogout()">
      <mat-icon fontIcon="logout" /> Logout 
    </button>
    } @else { 
    <a routerLink="/login" matButton><mat-icon fontIcon="login" />Login</a>
    }
</mat-toolbar>
<div class="wrapper">
<router-outlet />
</div>
