<mat-card class="small-card">
    <mat-card-header>
        <h1>Registracija</h1>
    </mat-card-header>
    <mat-card-content>
        <div>
        <mat-form-field class="full-width">
            <mat-label>Ime</mat-label>
            <input matInput type="text" [(ngModel)]="user.firstName">
        </mat-form-field>
        <mat-form-field class="full-width">
            <mat-label>Prezime</mat-label>
            <input matInput type="text" [(ngModel)]="user.lastName">
        </mat-form-field>
        <mat-form-field class="full-width">
            <mat-label>Telefon</mat-label>
            <input matInput type="text" [(ngModel)]="user.phone">
        </mat-form-field>
        <mat-form-field class="full-width">
            <mat-label>Adresa</mat-label>
            <input matInput type="text" [(ngModel)]="user.address">
        </mat-form-field>
        <mat-form-field class="full-width">
            <mat-label>Email</mat-label>
            <input matInput type="email" [(ngModel)]="user.email">
        </mat-form-field>
        <mat-form-field class="full-width">
            <mat-label>Sifra</mat-label>
            <input matInput type="password" [(ngModel)]="user.password">
        </mat-form-field>
        <mat-form-field class="full-width">
            <mat-label>Ponovite sifru</mat-label>
            <input matInput type="password" [(ngModel)]="repeat">
        </mat-form-field>
        <mat-form-field class="full-width">
        <mat-label>Omiljeni tip igracke: </mat-label>
        <mat-select [(ngModel)]="selectedToyType">
            @for(t of toyTypes(); track $index){
                <mat-option [value]="t">{{t}}</mat-option>
            }
        </mat-select>
        </mat-form-field>
        </div>
    </mat-card-content>
    <mat-card-actions>
        <button type="button" matButton (click)="doSignup()">
        <mat-icon fontIcon="send" /> Potvrdi
        </button>
        <a routerLink="/login" matButton>
        <mat-icon fontIcon="login" /> Prijavite se
        </a>
    </mat-card-actions>
</mat-card>
