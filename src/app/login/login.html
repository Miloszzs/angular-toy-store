<mat-card class="small-card">
    <mat-card-header>
        <h1>Prijava</h1>
    </mat-card-header>
    <mat-card-content>
        <div>
        <mat-form-field class="full-width">
            <mat-label>Email</mat-label>
            <input matInput type="email" [(ngModel)]="email">
        </mat-form-field>
        <mat-form-field class="full-width">
            <mat-label>Sifra</mat-label>
            <input matInput type="password" [(ngModel)]="password">
        </mat-form-field>
        </div>
    </mat-card-content>
    <mat-card-actions>
        <button type="button" matButton (click)="doLogin()">
        <mat-icon fontIcon="login" /> Prijavi se
        </button>
        <a routerLink="/signup" matButton>
        <mat-icon fontIcon="send" /> Registruj se
        </a>
    </mat-card-actions>
</mat-card>
